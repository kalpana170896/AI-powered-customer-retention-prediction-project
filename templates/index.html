<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            background:white;
            width:900px;
            border-radius:20px;
            padding:40px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#1e293b;
            margin-bottom:30px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:bold;
            color:#334155;
        }

        input,select{
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border:2px solid #2563eb;
        }

        .btn{
            width:100%;
            margin-top:30px;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .result{
            margin-top:25px;
            text-align:center;
            padding:20px;
            border-radius:12px;
            font-size:22px;
            font-weight:bold;
        }

        .churn{
            background:#fee2e2;
            color:#dc2626;
        }

        .not-churn{
            background:#dcfce7;
            color:#16a34a;
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:#64748b;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>📊 Customer Churn Prediction System</h1>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Partner</label>
                <select name="Partner">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dependents</label>
                <select name="Dependents">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tenure (Months)</label>
                <input type="number" name="tenure" required>
            </div>

            <div class="form-group">
                <label>Phone Service</label>
                <select name="PhoneService">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Monthly Charges</label>
                <input type="number" step="0.01" name="MonthlyCharges" required>
            </div>

            <div class="form-group">
                <label>Total Charges</label>
                <input type="number" step="0.01" name="TotalCharges" required>
            </div>

        </div>

        <button class="btn" type="submit">
            Predict Customer Churn
        </button>

    </form>

    {% if prediction %}

        {% if "Will Churn" in prediction %}

        <div class="result churn">
            ⚠️ {{ prediction }}
        </div>

        {% else %}

        <div class="result not-churn">
            ✅ {{ prediction }}
        </div>

        {% endif %}

    {% endif %}

    <div class="footer">
        Developed by Kalpana ❤️
    </div>

</div>

</body>
</html>
